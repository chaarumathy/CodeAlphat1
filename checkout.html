<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - NatiMart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .checkout-container {
            max-width: 800px;
            padding: 20px;
            margin: 20px auto;
            background: var(--bg-color);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }
        .checkout-container h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 1.2rem;
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .checkout-grid input, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .checkout-grid input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.1);
        }
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .order-summary {
            background: var(--bg-color);
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .total {
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 15px;
            text-align: right;
        }
        .place-order-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
        }
        .place-order-btn:hover {
            background: #555;
        }
        .place-order-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }
        @media (max-width: 1024px) {
            .checkout-grid {
                display: grid;
                grid-template-columns: auto;
            }
            #navCheckout {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <nav class="navbar">
            <div>
                <a href="index.html" class="nav-logo">NatiMart</a>
            </div>
            <div class="nav-item" id="navCheckout">
                <h2>Checkout</h2>
            </div>
            <ul class="nav-links">
                <li class="dark-toggle" id="dark-toggle">🌙</li>
            </ul>
            <button class="menu-btn" id="menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>
        </nav>
    </header>

    <div class="mobile-menu" id="mobile-menu">
        <div class="mobile-menu-header">
            <a href="index.html" class="nav-logo">NatiMart</a>
            <button class="close-btn" id="close-btn">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="mobile-nav-links">
            <div class="mobile-nav-item"><h2>Checkout</h2></div>
            <div class="mobile-nav-item">
                <div class="dark-toggle" id="mobile-dark-toggle">🌙</div>
            </div>
            <div class="mobile-nav-item">
                <button class="btn" id="logout">Logout</button>
            </div>
        </div>
    </div>

    <div class="menu_overlay" id="menu_overlay"></div>

    <div class="checkout-container">
        <h1>Checkout</h1>
        
        <div class="section-title">Shipping Information</div>
        <div class="checkout-grid">
            <div>
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Natinael Chufamo" required /> 
            </div>
            <div>
                <label>Email</label>
                <input type="email" id="email" placeholder="natinael@gmail.com" required /> 
            </div>
            <div>
                <label>Address</label>
                <input type="text" id="address" placeholder="bole, Addis Abeba, Ethiopia" required /> 
            </div>
            <div>
                <label>City</label>
                <input type="text" id="city" placeholder="City" required /> 
            </div>
            <div>
                <label>State</label>
                <input type="text" id="state" placeholder="State" required /> 
            </div>
            <div>
                <label>Postal Code</label>
                <input type="text" id="postalCode" placeholder="12345" required /> 
            </div>
        </div>

        <div class="section-title">Payment Method</div>
        <select id="paymentMethod">
            <option value="">Select Payment Method</option>
            <option value="card">Credit / Debit Card</option>
            <option value="cod">Cash on Delivery</option>
        </select>

        <div class="section-title">Order Summary</div>
        <div>
            <div class="order-summary" id="orderSummary"></div>
            <div class="order-item total">
                <span>Total Amount:</span>
                <span id="orderTotal">$0.00</span>
            </div>
        </div>
        <button id="placeOrderBtn" class="place-order-btn">Place Order</button>
    </div>

    <script type="module" src="/js/navbar.js"></script>
    <script src="products.js"></script>

    <script type="module">
        const token = localStorage.getItem("token");
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const orderSummary = document.getElementById("orderSummary");
        const orderTotal = document.getElementById("orderTotal");
        const placeOrderBtn = document.getElementById("placeOrderBtn");

        if (cart.length === 0) {
            orderSummary.innerHTML = '<p style="text-align:center; color:#999;">Your cart is empty. Please add items to checkout.</p>';
            placeOrderBtn.disabled = true;
            orderTotal.textContent = "$0.00";
        } else {
            const total = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
            orderTotal.textContent = `$${total.toFixed(2)}`;
            
            cart.forEach(product => {
                const div = document.createElement("div");
                div.classList = "order-item";
                const quantity = product.quantity || 1;
                const itemTotal = product.price * quantity;
                div.innerHTML = `
                    <span>${product.name} x (${quantity}) ${product.size ? `- Size: ${product.size}` : ''} ${product.color ? `- Color: ${product.color}` : ''}</span>
                    <span>$${itemTotal.toFixed(2)}</span>
                `;
                orderSummary.appendChild(div);
            });
        }

        placeOrderBtn.addEventListener("click", async () => {
            const fullName = document.getElementById("fullName").value.trim();
            const email = document.getElementById("email").value.trim();
            const address = document.getElementById("address").value.trim();
            const city = document.getElementById("city").value.trim();
            const state = document.getElementById("state").value.trim();
            const postalCode = document.getElementById("postalCode").value.trim();
            const paymentMethod = document.getElementById("paymentMethod").value;

            if (!fullName || !email || !address || !city || !state || !postalCode) {
                alert("⚠️ Please fill in all shipping information fields.");
                return;
            }

            if (!paymentMethod) {
                alert("⚠️ Please select a payment method.");
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert("⚠️ Please enter a valid email address.");
                return;
            }

            if (cart.length === 0) {
                alert("⚠️ Your cart is empty. Please add items before checking out.");
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);

            const orderData = {
                orderId: "ORD-" + Date.now(),
                date: new Date().toISOString(),
                customer: {
                    fullName,
                    email,
                    address,
                    city,
                    state,
                    postalCode
                },
                paymentMethod,
                items: cart.map(item => ({
                    id: item.id,
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity || 1,
                    size: item.size || null,
                    color: item.color || null,
                    image: item.image || null
                })),
                total: total,
                status: "pending",
                paymentStatus: paymentMethod === "cod" ? "pending" : "pending"
            };

            console.log("Order Data:", orderData);

            let orders = JSON.parse(localStorage.getItem("orders")) || [];
            orders.push(orderData);
            localStorage.setItem("orders", JSON.stringify(orders));

            localStorage.removeItem("cart");

            alert(` Order placed successfully!\n\nOrder ID: ${orderData.orderId}\nTotal Amount: $${total.toFixed(2)}\nItems: ${cart.length}\n\nThank you for shopping with NatiMart!`);

            window.location.href = "order.html";
        });
    </script>
</body>
</html>
